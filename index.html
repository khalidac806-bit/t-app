<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Intelligence Validator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); max-width: 450px; margin: auto; min-height: 520px; display: flex; flex-direction: column; justify-content: space-between; }
        .header { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .article-box { text-align: left; font-size: 13px; line-height: 1.5; color: #555; background: #fdfdfd; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .interactive-space { background: #f1f4f9; padding: 15px; border-radius: 10px; margin: 10px 0; text-align: left; min-height: 100px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; background: white; }
        .ad-banner { width: 100%; min-height: 50px; background: #eee; margin: 10px 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; border: 1px dashed #ccc; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-next:disabled { background: #e0e0e0; color: #888; cursor: not-allowed; }
        .processing-info { font-size: 12px; color: var(--primary); margin-top: 10px; font-style: italic; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--primary); width: 10%; transition: 0.3s; }
        .dot-flashing { width: 6px; height: 6px; border-radius: 5px; background-color: var(--primary); animation: dotFlashing 1s infinite alternate; }
        @keyframes dotFlashing { 0% { opacity: 1; } 100% { opacity: 0.1; } }
        .final-code-box { font-size: 26px; font-weight: bold; color: #155724; padding: 20px; border: 3px dashed #28a745; background: #d4edda; margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    
    <div id="content-area"></div>

    <div class="ad-banner">
        AD BANNER #1
    </div>

    <div id="interactive-area" class="interactive-space"></div>

    <div class="ad-banner">
        AD BANNER #2
    </div>

    <div id="action-area">
        <button id="nextBtn" class="btn-next" onclick="handleNextStep()" disabled>Processing...</button>
        <div id="status-container" class="processing-info">
            <span id="status-text">Handshaking with nodes...</span>
            <div class="dot-flashing"></div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ZONE ---
    // Change your proof code here whenever you want
    const MY_SECRET_PROOF_CODE = "WORKER-2026-X"; 
    
    // Change your SmartLink URL here
    const MY_SMARTLINK_URL = "https://YOUR_SMARTLINK_HERE";
    // --------------------------

    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentStep = 1;
    const totalSteps = 10;
    const waitTime = 30; 
    let timerInterval;

    const stages = [
        { title: "Network Configuration", content: "Select your preferred blockchain network to establish a secure data bridge.", input: '<label>Target Network:</label><select><option>Ethereum Mainnet</option><option>Solana (Fast)</option><option>Polygon Bridge</option></select>' },
        { title: "Hash Integrity", content: "Input a temporary session hash or public wallet ID for encryption benchmarking.", input: '<label>Session Hash:</label><input type="text" placeholder="0x... or Session_UID">' },
        { title: "Protocol Shield", content: "Choose the security protocol level for the cross-chain verification layer.", input: '<label>Shield Level:</label><select><option>Standard AES</option><option>Enhanced RSA-4096</option></select>' },
        { title: "Node Synchronization", content: "Adjusting the depth of node scanning to optimize proof-of-work efficiency.", input: '<label>Node Depth:</label><input type="text" placeholder="Default: 128-bit">' },
        { title: "Market Depth Audit", content: "The system is auditing liquidity pairs across decentralized exchanges (DEX).", input: '<label>Trading Pair:</label><select><option>BTC/USDT</option><option>ETH/USDC</option><option>BNB/BUSD</option></select>' },
        { title: "Gas Limit Calculation", content: "Estimating Gwei requirements based on current mempool congestion levels.", input: '<label>Gas Limit:</label><input type="text" placeholder="Auto-Calculate (Gwei)">' },
        { title: "Compliance Gateway", content: "Verifying session metadata against global regulatory anti-money laundering standards.", input: '<label>Compliance Region:</label><select><option>Global / International</option><option>EU Standards</option></select>' },
        { title: "Data Sharding", content: "Selecting the optimal sharding method for high-speed verification code generation.", input: '<label>Sharding Logic:</label><input type="text" placeholder="Auto-Detect Method">' },
        { title: "Final Handshake", content: "Establishing a direct link to the secure proof delivery server. Final check in progress.", input: '<label>Gateway Priority:</label><select><option>Express Delivery</option></select>' },
        { title: "Verification Success", content: "The system has successfully generated your unique verification code.", input: '' }
    ];

    function renderStep(step) {
        const data = stages[step - 1];
        document.getElementById('content-area').innerHTML = `
            <div class="header">PHASE ${step} OF ${totalSteps}</div>
            <h3 style="margin:5px 0;">${data.title}</h3>
            <div class="article-box">${data.content}</div>
        `;
        document.getElementById('interactive-area').innerHTML = data.input || '<p style="font-size:12px; color:green;">Process finished successfully.</p>';
        document.getElementById('progress').style.width = (step * 10) + "%";
        startStepTimer();
    }

    function startStepTimer() {
        clearInterval(timerInterval);
        let timeLeft = waitTime;
        const btn = document.getElementById('nextBtn');
        btn.disabled = true;
        btn.innerText = `Processing... (${timeLeft}s)`;
        document.getElementById('status-container').style.visibility = 'visible';

        timerInterval = setInterval(() => {
            timeLeft--;
            btn.innerText = `Processing... (${timeLeft}s)`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('status-container').style.visibility = 'hidden';
                btn.disabled = false;
                btn.innerText = (currentStep === 9) ? "Generate Final Proof" : "Proceed to Phase " + (currentStep + 1);
            }
        }, 1000);
    }

    function handleNextStep() {
        if (currentStep === 9) {
            window.open(MY_SMARTLINK_URL, '_blank');
        }

        if (currentStep < 10) {
            currentStep++;
            if(currentStep === 10) {
                showFinalCode();
            } else {
                renderStep(currentStep);
            }
        }
    }

    function showFinalCode() {
        document.getElementById('main-container').innerHTML = `
            <div class="progress-bar"><div style="width:100%;" class="progress-fill"></div></div>
            <h2 style="color: #28a745; margin-top: 20px;">System Validated!</h2>
            <div class="article-box">The encryption process is complete. Your verification code for SproutGigs is below.</div>
            <div class="final-code-box">${MY_SECRET_PROOF_CODE}</div>
            <p style="font-size: 13px; color: #666; margin-top: 20px;">
                Copy this code and paste it back into the job proof section.
            </p>
            <button class="btn-next" onclick="location.reload()">Restart Session</button>
        `;
    }

    renderStep(1);
</script>
</body>
</html>
