<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e9ecef; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .step { display: none; }
        .active { display: block; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; transition: 0.3s; }
        .btn:disabled { background: #ccc; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <h2>التحقق من الاتصال</h2>
        <p>نحن نتأكد من جودة اتصالك بالخادم...</p>
        <div class="loader"></div>
        <button class="btn" onclick="goToStep(2)">متابعة</button>
    </div>

    <div id="step2" class="step">
        <h2>توليد المفتاح</h2>
        <p>انتظر حتى ينتهي التشفير للحصول على الكود.</p>
        <div id="timer" style="font-size: 24px; color: red; margin: 20px 0;">15</div>
        <button id="nextBtn2" class="btn" disabled onclick="goToStep(3)">الخطوة التالية</button>
    </div>

    <div id="step3" class="step">
        <h2>الخطوة الأخيرة</h2>
        <p>يجب عليك زيارة خادم التحقق الخارجي لمرة واحدة.</p>
        <button class="btn" style="background: #28a745;" onclick="openAdLink()">فتح خادم التحقق</button>
        <button class="btn" onclick="goToStep(4)">لقد انتهيت، أظهر الك code</button>
    </div>

    <div id="step4" class="step">
        <h2>مبروك!</h2>
        <p>كود الإثبات الخاص بك هو:</p>
        <div id="finalCode" style="background: #eee; padding: 15px; border: 2px dashed #0088cc; font-size: 22px; font-weight: bold;"></div>
        <p style="font-size: 12px;">انسخ الكود وأرسله في SproutGigs.</p>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // فتح التطبيق بملء الشاشة

    function goToStep(stepNum) {
        // إخفاء كل الخطوات
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        // إظهار الخطوة المطلوبة
        document.getElementById('step' + stepNum).classList.add('active');

        if(stepNum === 2) {
            startTimer();
        }
        if(stepNum === 4) {
            // توليد كود عشوائي لزيادة المصداقية
            const randomCode = "ST-" + Math.floor(Math.random() * 90000 + 10000);
            document.getElementById('finalCode').innerText = randomCode;
        }
    }

    function startTimer() {
        let count = 15;
        const timerDiv = document.getElementById('timer');
        const btn = document.getElementById('nextBtn2');
        const interval = setInterval(() => {
            count--;
            timerDiv.innerText = count;
            if(count <= 0) {
                clearInterval(interval);
                timerDiv.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "استمرار";
            }
        }, 1000);
    }

    function openAdLink() {
        // ضع رابط الـ SmartLink من Monetag هنا
        window.open('https://your-smartlink-url.com', '_blank');
    }
</script>

</body>
</html>
