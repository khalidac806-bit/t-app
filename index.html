<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Intelligence Validator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); max-width: 450px; margin: auto; min-height: 500px; display: flex; flex-direction: column; justify-content: space-between; }
        .header { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .article-box { text-align: left; font-size: 13px; line-height: 1.5; color: #555; background: #fdfdfd; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .interactive-space { background: #f1f4f9; padding: 15px; border-radius: 10px; margin: 10px 0; text-align: left; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .ad-banner { width: 100%; min-height: 50px; background: #eee; margin: 10px 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; border: 1px dashed #ccc; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .btn-next:disabled { background: #e0e0e0; color: #888; }
        .processing-info { font-size: 12px; color: var(--primary); margin-top: 10px; font-style: italic; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .progress-bar { height: 4px; background: #eee; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--primary); width: 10%; transition: 0.3s; }
        .dot-flashing { width: 5px; height: 5px; border-radius: 5px; background-color: var(--primary); animation: dotFlashing 1s infinite alternate; }
        @keyframes dotFlashing { 0% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    
    <div id="content-area"></div>

    <div class="ad-banner">AD BANNER #1</div>

    <div id="interactive-area" class="interactive-space"></div>

    <div class="ad-banner">AD BANNER #2</div>

    <div id="action-area">
        <button id="nextBtn" class="btn-next" onclick="handleNextStep()" disabled>Processing...</button>
        <div id="status-container" class="processing-info">
            <span id="status-text">Handshaking...</span>
            <div class="dot-flashing"></div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentStep = 1;
    const waitTime = 30;
    let timerInterval;

    const stages = [
        { title: "Network Selection", content: "Select the primary blockchain network to begin the synchronization process.", input: '<label>Primary Network:</label><select><option>Mainnet (Default)</option><option>Testnet Ropsten</option><option>BSC Smart Chain</option></select>' },
        { title: "Wallet Hash Entry", content: "Enter a public wallet address or session hash to start the heuristic audit.", input: '<label>Public Hash:</label><input type="text" placeholder="0x... or Session ID">' },
        { title: "Security Protocol", content: "Choose the encryption standard for your proof-of-work generation.", input: '<label>Encryption Type:</label><select><option>AES-256 (High)</option><option>RSA-4096 (Secure)</option></select>' },
        { title: "Node Optimization", content: "Adjust the node scanning depth for faster packet verification.", input: '<label>Scanning Depth:</label><input type="text" placeholder="Default: 64-bit">' },
        { title: "Liquidity Analysis", content: "Define the pair you want to verify against the central liquidity pool.", input: '<label>Pair Selection:</label><select><option>BTC/USDT</option><option>ETH/USDT</option><option>SOL/USDC</option></select>' },
        { title: "Gas Limit Setup", content: "Set a temporary gas limit for on-chain data retrieval.", input: '<label>Gas Limit (Gwei):</label><input type="text" placeholder="e.g. 21000">' },
        { title: "Compliance Check", content: "Confirm your residency status for global AML regulation compliance.", input: '<label>Region:</label><select><option>European Union</option><option>North America</option><option>International</option></select>' },
        { title: "Sharding Method", content: "Select the data sharding method for final proof encryption.", input: '<label>Sharding Protocol:</label><input type="text" placeholder="Auto-Detect">' },
        { title: "Gateway Validation", content: "The system is ready to open the secure gateway. Click the button below after the processing ends.", input: '<label>Gateway Priority:</label><select><option>High Priority</option></select>' },
        { title: "Success", content: "Verification complete. Your unique code is ready.", input: '' }
    ];

    function renderStep(step) {
        const data = stages[step - 1];
        document.getElementById('content-area').innerHTML = `
            <div class="header">SYSTEM ANALYSIS: PHASE ${step}</div>
            <h3 style="margin:5px 0;">${data.title}</h3>
            <div class="article-box">${data.content}</div>
        `;
        document.getElementById('interactive-area').innerHTML = data.input || '<p style="font-size:12px">Analysis in progress...</p>';
        document.getElementById('progress').style.width = (step * 10) + "%";
        startStepTimer();
    }

    function startStepTimer() {
        clearInterval(timerInterval);
        let timeLeft = waitTime;
        const btn = document.getElementById('nextBtn');
        const statusText = document.getElementById('status-text');
        btn.disabled = true;
        btn.innerText = `Processing... (${timeLeft}s)`;

        timerInterval = setInterval(() => {
            timeLeft--;
            btn.innerText = `Processing... (${timeLeft}s)`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('status-container').style.visibility = 'hidden';
                btn.disabled = false;
                btn.innerText = (currentStep === 9) ? "Final Verification" : "Next Phase";
            }
        }, 1000);
    }

    function handleNextStep() {
        if (currentStep === 9) {
            window.open('https://YOUR_SMARTLINK_URL', '_blank');
        }
        if (currentStep < 10) {
            currentStep++;
            document.getElementById('status-container').style.visibility = 'visible';
            if(currentStep === 10) showFinalCode();
            else renderStep(currentStep);
        }
    }

    function showFinalCode() {
        const uniqueCode = "CP-" + Math.floor(Math.random() * 90000 + 10000);
        document.getElementById('container-main').innerHTML = `<h2>Success!</h2><div class="article-box">${uniqueCode}</div>`;
    }

    renderStep(1);
</script>
</body>
</html>
